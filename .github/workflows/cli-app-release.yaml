name: cli-app-release
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-release:
    permissions:
      contents: write
    uses: kukushkin/workflows/.github/workflows/github-release.yaml@main
    with:
      write_version: true
      version_filename: version/version.txt

  goreleaser:
    runs-on: ubuntu-latest
    needs: github-release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.github-release.outputs.version_tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
