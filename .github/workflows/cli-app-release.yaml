name: cli-app-release
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  github-release:
    permissions:
      contents: write
    uses: kukushkin/workflows/.github/workflows/github-release.yaml@main
    with:
      write_version: true
      version_filename: version/version.txt

  goreleaser:
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Force-pull latest version
        run: |
          git fetch --tags --force

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
